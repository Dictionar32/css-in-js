name: Quality Checks

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-dependency-paths: native/Cargo.lock
      
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Rust native bindings
        run: npm run build:rust
      
      - name: Verify root + example builds
        run: npm run verify:builds
      
      - name: Format, lint & typecheck
        run: npm run check
      
      - name: Security audit
        run: npm audit --audit-level=moderate
      
      - name: Check bundle sizes
        run: |
          echo "=== dist/ sizes ==="
          ls -lh dist/*.js | awk '{print $5, $9}'
