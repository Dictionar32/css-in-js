name: Release Candidate Gate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 5.0.1)"
        required: false
        default: "5.0.1"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-dependency-paths: native/Cargo.lock
      
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Rust native bindings
        run: npm run build:rust
      
      - name: Build
        run: npm run build
      
      - name: Test
        run: npm run test
      
      - name: Check
        run: npm run check
      
      - name: Smoke tests
        run: node scripts/smoke/index.mjs
        env:
          SMOKE_VERBOSE: "1"
      
      - name: Final validation
        run: node scripts/validate/final-report.mjs
      
      - name: Health summary
        run: node scripts/validate/health-summary.mjs
      
      - name: Sprint benchmark (100 files)
        run: node scripts/benchmark/sprint2-bench.mjs --files=100
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ github.event.inputs.version }}-validation
          path: |
            artifacts/*.json
            docs/benchmark/sprint2-results.json